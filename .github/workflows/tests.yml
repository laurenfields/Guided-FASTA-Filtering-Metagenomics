name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: JavaScript unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run node:test suites
        run: node --test tests/js/
